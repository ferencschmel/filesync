trigger:
  tags:
    include:
      - 'v*'
  branches:
    exclude:
      - '*'

pr: none

variables:
  nodeVersion: '20.x'
  npmCacheFolder: $(Pipeline.Workspace)/.npm
  releaseVersion: $[coalesce(variables['Build.SourceBranchName'], '0.0.0')]

stages:
  - stage: BuildPlatforms
    displayName: 'Build Platform Executables'
    jobs:

      - job: BuildWindows
        displayName: 'Build Windows x64'
        pool:
          vmImage: 'windows-2022'
        steps:
          - checkout: self
            displayName: 'Checkout source code'
            clean: true

          - task: NodeTool@0
            displayName: 'Install Node.js $(nodeVersion)'
            inputs:
              versionSpec: $(nodeVersion)

          - task: Cache@2
            displayName: 'Cache npm packages'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npmCacheFolder)

          - script: npm ci --cache $(npmCacheFolder)
            displayName: 'Install dependencies (npm ci)'

          - script: npm run build
            displayName: 'Compile TypeScript'

          - script: npm run package:win
            displayName: 'Package Windows x64 executable'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Windows x64 artifact'
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/release/synctool-win-x64.exe'
              artifact: 'synctool-win-x64'
              publishLocation: 'pipeline'

      - job: BuildMacOS
        displayName: 'Build macOS x64 and arm64'
        pool:
          vmImage: 'macOS-latest'
        steps:
          - checkout: self
            displayName: 'Checkout source code'
            clean: true

          - task: NodeTool@0
            displayName: 'Install Node.js $(nodeVersion)'
            inputs:
              versionSpec: $(nodeVersion)

          - task: Cache@2
            displayName: 'Cache npm packages'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npmCacheFolder)

          - script: npm ci --cache $(npmCacheFolder)
            displayName: 'Install dependencies (npm ci)'

          - script: npm run build
            displayName: 'Compile TypeScript'

          - script: npm run package:mac-x64
            displayName: 'Package macOS x64 executable'

          - script: npm run package:mac-arm64
            displayName: 'Package macOS arm64 executable'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish macOS x64 artifact'
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/release/synctool-macos-x64'
              artifact: 'synctool-macos-x64'
              publishLocation: 'pipeline'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish macOS arm64 artifact'
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/release/synctool-macos-arm64'
              artifact: 'synctool-macos-arm64'
              publishLocation: 'pipeline'

      - job: BuildLinux
        displayName: 'Build Linux x64'
        pool:
          vmImage: 'ubuntu-22.04'
        steps:
          - checkout: self
            displayName: 'Checkout source code'
            clean: true

          - task: NodeTool@0
            displayName: 'Install Node.js $(nodeVersion)'
            inputs:
              versionSpec: $(nodeVersion)

          - task: Cache@2
            displayName: 'Cache npm packages'
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(npmCacheFolder)

          - script: npm ci --cache $(npmCacheFolder)
            displayName: 'Install dependencies (npm ci)'

          - script: npm run build
            displayName: 'Compile TypeScript'

          - script: npm run package:linux
            displayName: 'Package Linux x64 executable'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Linux x64 artifact'
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/release/synctool-linux-x64'
              artifact: 'synctool-linux-x64'
              publishLocation: 'pipeline'

  - stage: PublishRelease
    displayName: 'Publish Release Artifacts'
    dependsOn:
      - BuildPlatforms
    condition: succeeded('BuildPlatforms')
    jobs:
      - job: CollectAndPublish
        displayName: 'Collect all platform artifacts and publish release'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: none

          - task: DownloadPipelineArtifact@2
            displayName: 'Download Windows x64 artifact'
            inputs:
              artifact: 'synctool-win-x64'
              targetPath: '$(Pipeline.Workspace)/release'

          - task: DownloadPipelineArtifact@2
            displayName: 'Download macOS x64 artifact'
            inputs:
              artifact: 'synctool-macos-x64'
              targetPath: '$(Pipeline.Workspace)/release'

          - task: DownloadPipelineArtifact@2
            displayName: 'Download macOS arm64 artifact'
            inputs:
              artifact: 'synctool-macos-arm64'
              targetPath: '$(Pipeline.Workspace)/release'

          - task: DownloadPipelineArtifact@2
            displayName: 'Download Linux x64 artifact'
            inputs:
              artifact: 'synctool-linux-x64'
              targetPath: '$(Pipeline.Workspace)/release'

          - script: |
              echo "Release contents:"
              ls -lh $(Pipeline.Workspace)/release/
            displayName: 'List release artifacts'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish combined release artifact'
            inputs:
              targetPath: '$(Pipeline.Workspace)/release'
              artifact: 'synctool-$(releaseVersion)-all-platforms'
              publishLocation: 'pipeline'
